# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------

scholar:
  [cite_start]last_name: [Dewan] # [cite: 1]
  first_name: [MD. [cite_start]Rubel] # [cite: 1]

  style: apa
  locale: en

  source: /_bibliography/
